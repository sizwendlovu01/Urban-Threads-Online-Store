<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Urban Threads</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav>
        <a href="index.html" class="logo">Urban<span>Threads</span></a>
        <div class="nav-links">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">☀️</button>
            <span id="user-info"></span>
            <a href="shop.html">Shop</a>
            <a href="cart.html" id="cart-link" style="display:none;">Cart</a>
            <a href="login.html" id="login-link">Login</a>
            <button id="logout-btn" class="btn btn-outline" style="display:none;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2 class="section-title">Your Cart</h2>
        <div id="cart-items-container">
            <p class="empty-cart">Loading cart...</p>
        </div>

        <div class="cart-summary" id="cart-summary" style="display:none;">
            <h3>Order Summary</h3>
            <div class="cart-total" id="cart-total">R0.00</div>
            <button class="btn" id="checkout-btn" style="width: 100%;">Proceed to Checkout</button>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/cart.js"></script>
</body>

</html>
