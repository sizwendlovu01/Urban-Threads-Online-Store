<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Urban Threads</title>
    <script src="js/theme.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Urban<span>Threads</span></a>
        <div class="nav-links">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">☀️</button>
            <span id="user-info"></span>
            <a href="shop.html">Shop</a>
            <a href="cart.html" id="cart-link" style="display:none;">Cart</a>
            <a href="login.html" id="login-link">Login</a>
            <button id="logout-btn" class="btn btn-outline" style="display:none;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="auth-container" id="auth-box">
            <h2 id="auth-title">Log In</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn" style="width: 100%;" id="auth-btn">Log In</button>
                <div class="auth-divider"><span>or</span></div>
                <button type="button" class="btn btn-google" style="width: 100%;" id="google-auth-btn">Sign in with Google</button>
                <div id="auth-error" class="error-message"></div>
            </form>
            <div class="auth-switch">
                <p id="auth-switch-text">Don't have an account? <a id="switch-mode">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
